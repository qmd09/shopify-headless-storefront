# In Shopify Storefront API 2024-01 the checkout is driven entirely by the Cart API.
# After building a cart, cart.checkoutUrl redirects the customer to Shopify's hosted checkout.
# No separate checkout mutation is required — the URL is returned with every cart operation.
#
# GET_CART — used by CartContext on app boot (restores session from localStorage cartId)
# and before initiating checkout to ensure cart state is fresh.
query GetCart($cartId: ID!) {
  cart(id: $cartId) {
    id
    checkoutUrl
    totalQuantity
    lines(first: 100) {
      edges {
        node {
          id
          quantity
          merchandise {
            ... on ProductVariant {
              id
              title
              price { amount currencyCode }
              product {
                id title handle
                images(first: 1) {
                  edges { node { id url altText width height } }
                }
              }
              selectedOptions { name value }
            }
          }
          cost { totalAmount { amount currencyCode } }
        }
      }
    }
    cost {
      subtotalAmount { amount currencyCode }
      totalAmount { amount currencyCode }
      totalTaxAmount { amount currencyCode }
    }
  }
}
